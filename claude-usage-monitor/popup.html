<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Claude Usage Monitor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a;
      color: #e8e8e8;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #333;
    }
    .logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #cc785c, #d4956b);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: bold; color: white;
    }
    .title { font-size: 15px; font-weight: 600; color: #fff; }
    .subtitle { font-size: 11px; color: #888; margin-top: 1px; }

    .account {
      background: #242424;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 12px;
    }
    .account-email { font-size: 13px; color: #ccc; word-break: break-all; }
    .account-name { font-size: 11px; color: #666; margin-top: 3px; }
    .plan-badge {
      display: inline-block;
      font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 20px;
      background: #2a3f5e; color: #6ba3ff;
      margin-top: 6px;
    }

    .section-title {
      font-size: 11px; font-weight: 600;
      color: #666; text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .usage-card {
      background: #242424;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 10px;
    }
    .usage-label {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 8px;
    }
    .usage-name { font-size: 13px; color: #ccc; }
    .usage-pct { font-size: 13px; font-weight: 700; color: #fff; }
    .bar-bg {
      height: 6px; background: #333; border-radius: 3px; overflow: hidden;
    }
    .bar-fill {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, #4b8ef1, #6ba3ff);
      transition: width 0.4s ease;
    }
    .bar-fill.warn { background: linear-gradient(90deg, #f0a500, #f5c842); }
    .bar-fill.danger { background: linear-gradient(90deg, #e05555, #ff7070); }
    .resets { font-size: 11px; color: #555; margin-top: 6px; }

    .extra-row {
      display: flex; justify-content: space-between; align-items: center;
      background: #242424; border-radius: 10px;
      padding: 10px 14px; margin-bottom: 10px;
      font-size: 12px; color: #888;
    }
    .extra-dot {
      width: 8px; height: 8px; border-radius: 50%;
    }
    .extra-dot.on { background: #4caf50; }
    .extra-dot.off { background: #555; }

    .footer {
      text-align: center; font-size: 10px; color: #444;
      margin-top: 4px;
    }
    .refresh-btn {
      display: block; width: 100%;
      background: #2a2a2a; border: 1px solid #3a3a3a;
      color: #888; border-radius: 8px;
      padding: 8px; font-size: 12px; cursor: pointer;
      margin-bottom: 10px; transition: background 0.2s;
    }
    .refresh-btn:hover { background: #333; color: #ccc; }
    .no-data {
      text-align: center; padding: 24px 0;
      color: #555; font-size: 13px; line-height: 1.8;
    }
    .no-data a { color: #4b8ef1; text-decoration: none; }
    .alias-row {
      display: flex; gap: 6px; align-items: center;
      background: #242424; border-radius: 10px;
      padding: 10px 14px; margin-bottom: 10px;
    }
    .alias-row input {
      flex: 1; background: #1a1a1a; border: 1px solid #3a3a3a;
      border-radius: 6px; padding: 5px 8px;
      color: #ccc; font-size: 12px; outline: none;
    }
    .alias-row input:focus { border-color: #cc785c; }
    .alias-row button {
      background: #cc785c; border: none; border-radius: 6px;
      color: #fff; font-size: 11px; padding: 5px 10px;
      cursor: pointer; white-space: nowrap;
    }
    .alias-row button:hover { background: #d4956b; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">C</div>
    <div>
      <div class="title">Claude Usage Monitor</div>
      <div class="subtitle">账户用量监控</div>
    </div>
  </div>

  <div id="content"></div>

  <div class="alias-row">
    <input type="text" id="aliasInput" placeholder="账号别名（如 account1）" />
    <button id="saveAlias">保存</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
