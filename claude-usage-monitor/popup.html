<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>用量监控</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      scrollbar-width: thin;
      scrollbar-color: #555 #181818;
    }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a;
      color: #e8e8e8;
      padding: 16px;
      scrollbar-width: thin;
      scrollbar-color: #555 #181818;
    }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: #181818; }
    ::-webkit-scrollbar-thumb {
      background: #555;
      border-radius: 999px;
      border: 2px solid #181818;
    }
    ::-webkit-scrollbar-thumb:hover { background: #6a6a6a; }
    ::-webkit-scrollbar-corner { background: #181818; }
    .header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #333;
    }
    .logo { width: 32px; height: 32px; border-radius: 6px; object-fit: contain; }
    .title { font-size: 15px; font-weight: 600; color: #fff; }
    .subtitle { font-size: 11px; color: #888; margin-top: 1px; }
    .account, .usage-card, .extra-row, .alias-row {
      background: #242424; border-radius: 10px; padding: 12px 14px; margin-bottom: 10px;
    }
    .account-email { font-size: 13px; color: #ccc; word-break: break-all; }
    .account-name, .resets { font-size: 11px; color: #666; margin-top: 4px; }
    .plan-badge {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 20px; background: #2a3f5e;
      color: #6ba3ff; margin-top: 6px;
    }
    .section-title {
      font-size: 11px; font-weight: 700; color: #777; text-transform: uppercase;
      letter-spacing: 0.5px; margin: 14px 0 8px;
    }
    .usage-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; gap: 8px; }
    .usage-name { font-size: 12px; color: #ccc; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .usage-pct { font-size: 12px; font-weight: 700; color: #fff; white-space: nowrap; }
    .bar-bg { height: 6px; background: #333; border-radius: 3px; overflow: hidden; }
    .bar-fill {
      height: 100%; border-radius: 3px; background: linear-gradient(90deg, #4b8ef1, #6ba3ff);
      transition: width 0.4s ease;
    }
    .bar-fill.warn { background: linear-gradient(90deg, #f0a500, #f5c842); }
    .bar-fill.danger { background: linear-gradient(90deg, #e05555, #ff7070); }
    .extra-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #888; }
    .extra-dot { width: 8px; height: 8px; border-radius: 50%; }
    .extra-dot.on { background: #4caf50; }
    .extra-dot.off { background: #555; }
    .footer { text-align: center; font-size: 10px; color: #555; margin-top: 4px; }
    .refresh-btn {
      display: block; width: 100%; background: #2a2a2a; border: 1px solid #3a3a3a;
      color: #aaa; border-radius: 8px; padding: 8px; font-size: 12px; cursor: pointer;
      margin-bottom: 10px; transition: background 0.2s;
    }
    .refresh-btn:hover { background: #333; color: #ddd; }
    .no-data { text-align: center; padding: 18px 0; color: #666; font-size: 13px; line-height: 1.8; }
    .no-data a { color: #4b8ef1; text-decoration: none; }
    .alias-row { display: grid; grid-template-columns: 1fr 1fr 96px auto; gap: 6px; align-items: center; }
    .alias-row input, .alias-row select {
      min-width: 0; background: #1a1a1a; border: 1px solid #3a3a3a;
      border-radius: 6px; padding: 5px 8px; color: #ccc; font-size: 12px; outline: none;
    }
    .alias-row input:focus, .alias-row select:focus { border-color: #cc785c; }
    .alias-row button {
      background: #cc785c; border: none; border-radius: 6px;
      color: #fff; font-size: 11px; padding: 5px 10px; cursor: pointer; white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="header">
    <img class="logo" src="icons/icon48.png" alt="logo" />
    <div>
      <div class="title">用量监控</div>
      <div class="subtitle">Claude + Codex</div>
    </div>
  </div>

  <div id="content"></div>

  <div class="alias-row">
    <input type="text" id="aliasInput" placeholder="Claude 别名" />
    <input type="text" id="codexAliasInput" placeholder="Codex 别名" />
    <select id="codexPlanInput">
      <option value="plus">Plus 1x</option>
      <option value="pro5">Pro 5x</option>
      <option value="pro10">Pro 10x</option>
      <option value="pro20">Pro 20x</option>
      <option value="go">Go 不记录</option>
    </select>
    <button id="saveAlias">保存</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
